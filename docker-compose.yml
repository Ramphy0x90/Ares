services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ares-data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ares-data:
